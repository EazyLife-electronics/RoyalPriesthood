<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Royal Priesthood Studio | Ibadan</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
<style>
  :root {
    --gold:#C9A84C; --gold-light:#E8C97A; --gold-pale:#F5E6B8;
    --black:#060606; --deep:#0D0A06; --charcoal:#1A1510; --mid:#2A2118;
    --text:#D4C09A; --muted:#7A6A4A;
    --nav-bg: rgba(6, 6, 6, 0.95);
    --white: #FFFFFF;
    --noise-opacity: 0.35;
  }

  [data-theme="light"] {
    --black: #FCFBF7; --deep: #F4F1E8; --charcoal: #E9E4D5; --mid: #DED8C4;
    --text: #332D24; --muted: #6B5F4A; --nav-bg: rgba(252, 251, 247, 0.95);
    --white: #060606; --noise-opacity: 0.15;
  }

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--black);color:var(--text);font-family:'Cormorant Garamond',serif;overflow-x:hidden;transition: background 0.5s ease, color 0.5s ease;}

  /* CURSOR */
  .cursor{position:fixed;width:12px;height:12px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:difference;}
  .cursor-ring{position:fixed;width:36px;height:36px;border:1px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.5;transition:width .2s,height .2s,opacity .3s;}
  .cursor.expand{width:20px;height:20px;}.cursor-ring.expand{width:60px;height:60px;opacity:.2;}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:24px 60px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom, var(--nav-bg), transparent);transition:background .4s;}
  nav.scrolled{background:var(--nav-bg);border-bottom:1px solid rgba(201,168,76,.15);}
  .nav-logo{font-family:'Cinzel Decorative',cursive;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.15em;text-decoration:none;text-transform:uppercase;}
  .nav-logo span{display:block;font-size:9px;font-weight:400;color:var(--muted);letter-spacing:.4em;}
  .nav-links{display:flex;gap:40px;list-style:none;align-items:center;}
  .nav-links a{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;}
  .nav-links a:hover{color:var(--gold-light);}
  
  .theme-toggle { background: none; border: 1px solid rgba(201, 168, 76, 0.3); color: var(--gold); cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s;}

  /* HERO (Simplified for brevity, matches your design) */
  #hero{height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden; text-align: center; background: var(--black);}
  .hero-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(40px,7vw,96px);font-weight:900;color:var(--white);}
  .gold{color:var(--gold);}

  /* NEW GALLERY SLIDER SECTION */
  #gallery{padding:140px 60px;background:var(--deep);}
  .section-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:16px;}
  .section-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(28px,4vw,52px);font-weight:700;color:var(--white);text-align:center;margin-bottom:60px;}

  .gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:30px;max-width:1300px;margin:0 auto;}
  .gallery-item{background:var(--charcoal);overflow:hidden;position:relative; transition: background 0.3s; border: 1px solid rgba(201,168,76,0.05);}
  
  .gallery-media-wrap{position:relative;aspect-ratio:16/10;overflow:hidden;background:#000; touch-action: pan-y;}
  .slider-container{display:flex;height:100%;transition:transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); will-change: transform;}
  .slider-container img, .slider-container iframe{min-width:100%;width:100%;height:100%;object-fit:cover;}

  .slider-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);color:var(--gold-light);border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;z-index:10;opacity:0;transition:0.3s;display:flex;align-items:center;justify-content:center;}
  .gallery-item:hover .slider-nav{opacity:1;}
  .prev-btn{left:15px;}.next-btn{right:15px;}
  
  .slider-dots{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:11;}
  .dot{width:7px;height:7px;background:rgba(255,255,255,0.2);border-radius:50%;transition:0.3s;}
  .dot.active{background:var(--gold);transform:scale(1.4);}

  .gallery-item-body{padding:32px;}
  .gallery-item-title{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--white);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
  .gallery-item-desc{font-size:16px;color:var(--muted);line-height:1.7;font-weight:300;}

  /* SHARED REVEAL */
  .reveal{opacity:0;transform:translateY(30px);transition:0.8s cubic-bezier(.16,1,.3,1);}
  .reveal.visible{opacity:1;transform:translateY(0);}

  @media(max-width:900px){
    nav{padding:20px 24px;}
    .nav-links{display:none;}
    .gallery-grid{grid-template-columns:1fr;}
    #gallery{padding:80px 24px;}
    .slider-nav { display: none; } /* Mobile uses swipe */
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar">
  <a class="nav-logo" href="#hero">Royal Priesthood<span>Studio · Ibadan</span></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#gallery">Gallery</a></li>
    <li><button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-content">
    <h1 class="hero-title">Royal<br/><span class="gold">Priesthood</span></h1>
    <p style="letter-spacing: 0.4em; text-transform: uppercase; font-size: 12px; color: var(--gold); margin-top: 20px;">Photography & Videography</p>
  </div>
</section>

<section id="gallery">
  <div class="gallery-inner">
    <div class="section-label">Portfolio</div>
    <h2 class="section-title">Visual <span class="gold">Stories</span></h2>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</section>

<script>
/* ── THEME & CURSOR ── */
const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', () => {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
  themeToggle.querySelector('i').className = isLight ? 'fas fa-moon' : 'fas fa-sun';
});

const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
(function tick(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tick);})();

/* ── GALLERY LOGIC ── */
async function loadGallery() {
  try {
    const response = await fetch('gallery.json');
    const gallery = await response.json();
    const grid = document.getElementById('gallery-grid');

    grid.innerHTML = gallery.map((item, idx) => {
      const isMulti = item.media && item.media.length > 1;
      const mediaHTML = item.media.map(url => {
        if(url.includes('youtube.com') || url.includes('embed')) {
          return `<div class="slide"><iframe src="${url}" frameborder="0" allowfullscreen></iframe></div>`;
        }
        return `<div class="slide"><img src="${url}" alt="${item.title}" loading="lazy"></div>`;
      }).join('');

      const dotsHTML = isMulti ? `<div class="slider-dots">${item.media.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>` : '';
      const navHTML = isMulti ? `
        <button class="slider-nav prev-btn" onclick="moveSlider(${idx}, -1)"><i class="fas fa-chevron-left"></i></button>
        <button class="slider-nav next-btn" onclick="moveSlider(${idx}, 1)"><i class="fas fa-chevron-right"></i></button>
      ` : '';

      return `
        <div class="gallery-item reveal" id="gal-${idx}" data-current="0" data-total="${item.media.length}">
          <div class="gallery-media-wrap" 
               ontouchstart="handleTouchStart(event)" 
               ontouchend="handleTouchEnd(event, ${idx})">
            ${navHTML}
            <div class="slider-container" id="slide-cont-${idx}">${mediaHTML}</div>
            ${dotsHTML}
          </div>
          <div class="gallery-item-body">
            <h3 class="gallery-item-title">${item.title}</h3>
            <p class="gallery-item-desc">${item.desc}</p>
          </div>
        </div>
      `;
    }).join('');

    // Reveal Animation
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  } catch (e) { console.error("Gallery failed to load. Check gallery.json", e); }
}

/* ── SLIDER & SWIPE ACTIONS ── */
window.moveSlider = function(idx, dir) {
  const el = document.getElementById(`gal-${idx}`);
  const cont = document.getElementById(`slide-cont-${idx}`);
  const dots = el.querySelectorAll('.dot');
  let current = parseInt(el.getAttribute('data-current'));
  const total = parseInt(el.getAttribute('data-total'));

  current = (current + dir + total) % total;
  el.setAttribute('data-current', current);
  cont.style.transform = `translateX(-${current * 100}%)`;
  if(dots.length) {
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
  }
};

let touchStartX = 0;
window.handleTouchStart = (e) => { touchStartX = e.changedTouches[0].screenX; };
window.handleTouchEnd = (e, idx) => {
  const touchEndX = e.changedTouches[0].screenX;
  if (touchEndX < touchStartX - 50) moveSlider(idx, 1);
  if (touchEndX > touchStartX + 50) moveSlider(idx, -1);
};

window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
});

loadGallery();
</script>
</body>
</html>
