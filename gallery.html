<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Royal Priest Studios</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .gallery-card { transition: all 0.4s; }
    .gallery-card:hover { transform: translateY(-10px); }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur z-50 border-b border-zinc-800">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold">ROYAL PRIEST</a>
      <div class="flex gap-8 text-sm uppercase tracking-widest">
        <a href="index.html#services" class="hover:text-amber-400">Services</a>
        <a href="gallery.html" class="text-amber-400">Gallery</a>
        <a href="index.html#contact" class="hover:text-amber-400">Contact</a>
      </div>
    </div>
  </nav>

  <div class="pt-24 pb-12 max-w-6xl mx-auto px-6">
    <h1 class="text-5xl font-bold text-center mb-4">Our Gallery</h1>
    <p class="text-center text-zinc-400 text-xl">Moments, Sessions &amp; Creations at Royal Priest Studios</p>
  </div>

  <!-- Gallery Grid -->
  <section class="max-w-6xl mx-auto px-6 pb-20">
    <div id="full-gallery" class="grid md:grid-cols-2 gap-10"></div>
  </section>

  <!-- Floating WhatsApp -->
  <a id="floating-whatsapp" href="#" target="_blank"
     class="fixed bottom-6 right-6 bg-green-600 hover:bg-green-700 w-16 h-16 rounded-full flex items-center justify-center text-4xl shadow-2xl z-50">
    <i class="fab fa-whatsapp"></i>
  </a>

  <footer class="py-10 text-center text-zinc-500 text-sm border-t border-zinc-800">
    © 2026 Royal Priest Studios • Ibadan
  </footer>

  <script>
    async function loadGallery() {
      const gallery = await fetch('gallery.json').then(r => r.json());
      const container = document.getElementById('full-gallery');
      const waBase = "https://wa.me/2347080868471"; // Update if needed

      gallery.forEach(item => {
        let mediaHTML = '';

        if (item.type === 'video' || item.url.includes('youtube.com')) {
          mediaHTML = `
            <div class="aspect-video">
              <iframe class="w-full h-full rounded-3xl" src="${item.url}" 
                      frameborder="0" allowfullscreen></iframe>
            </div>`;
        } else {
          mediaHTML = `
            <img src="${item.url || item.thumbnail}" 
                 class="w-full rounded-3xl object-cover aspect-video" alt="${item.title}">`;
        }

        const card = `
          <div class="bg-zinc-900 rounded-3xl overflow-hidden gallery-card">
            ${mediaHTML}
            <div class="p-8">
              <div class="flex justify-between items-start mb-4">
                <h3 class="text-2xl font-bold">${item.title}</h3>
                <span class="text-amber-400 text-sm whitespace-nowrap">${item.date}</span>
              </div>
              <p class="text-zinc-300 leading-relaxed">${item.desc}</p>
              
              <div class="mt-8 pt-6 border-t border-zinc-700">
                <a href="\( {waBase}?text=Hello,%20I%20saw%20the%20 \){encodeURIComponent(item.title)}%20and%20I%20want%20to%20book%20a%20similar%20session" 
                   target="_blank"
                   class="inline-flex items-center gap-3 text-amber-400 hover:text-amber-300">
                  <i class="fab fa-whatsapp"></i>
                  <span class="font-medium">Book a similar session</span>
                </a>
              </div>
            </div>
          </div>`;
        container.innerHTML += card;
      });
    }

    window.onload = loadGallery;
  </script>
</body>
</html>
